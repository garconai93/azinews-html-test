<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - AziNews</title>
    <meta name="description" content="Contact AziNews - Aplicație de știri din România">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border-color: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 40px;
            border: 1px solid var(--border-color);
        }
        
        h1 {
            color: var(--accent);
            margin-bottom: 30px;
        }
        
        .contact-info {
            margin: 30px 0;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            margin: 15px 0;
        }
        
        .contact-item span {
            font-size: 1.5rem;
        }
        
        a {
            color: var(--accent);
            text-decoration: none;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Înapoi la știri</a>
        
        <h1>📧 Contact AziNews</h1>
        
        <p>Pentru orice întrebare, sugestii sau probleme, ne poți contacta la:</p>
        
        <div class="contact-info">
            <div class="contact-item">
                <span>📧</span>
                <div>
                    <strong>Email:</strong><br>
                    <a href="mailto:garconai93@gmail.com">garconai93@gmail.com</a>
                </div>
            </div>
        </div>
        
        <hr style="border-color: var(--border-color); margin: 30px 0;">
        
        <p style="color: var(--text-secondary); font-size: 0.9rem;">
            © 2026 AziNews. Toate drepturile rezervate.
        </p>
    </div>
</body>
</html>
