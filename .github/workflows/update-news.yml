# Auto-update AziNews every hour
name: AziNews Update

on:
  schedule:
    - cron: '42 * * * *'  # Every hour at minute 42 (active)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser beautifulsoup4 requests

      - name: Update news
        run: |
          python3 update_news.py
          python3 generate_rss.py

      - name: Commit and push
        run: |
          git config --local user.email "garconaibot@gmail.com"
          git config --local user.name "GitHub Actions"
          git add .
          git diff --staged --quiet || git commit -m "Auto-update: $(date)"
          git push ${{ github.token }}@github.com/garconai93/azinews-html-test.git master:master