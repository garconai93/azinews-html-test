name: Horoscop Zilnic

on:
  schedule:
    - cron: '42 4 * * *'  # 6:42 Bucharest = 4:42 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install beautifulsoup4 requests

      - name: Update horoscope
        run: |
          python3 update_horoscope.py

      - name: Commit and push
        run: |
          git config --local user.email "garconaibot@gmail.com"
          git config --local user.name "GitHub Actions"
          git add .
          git diff --staged --quiet || git commit -m "Horoscop zilnic $(date +%Y-%m-%d)"
          git push origin master:gh-pages